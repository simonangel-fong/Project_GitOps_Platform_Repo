name: 10-ci-check

on:
  # push to feature-, hotfix-, filter by path
  push:
    branches:
      - 'feature-*'
      - 'hotfix-*'
    paths:
      - 'apps/**'
      - 'platform/**'
      - 'bootstrap/**'
      - '.github/**'
  # pr to dev, stage, prod
  pull_request_target:
    branches: [dev, stage, prod]
    paths:
      - 'apps/**'
      - 'platform/**'
      - 'bootstrap/**'
      - '.github/**'
  # manual
  workflow_dispatch:

# no concurrency per ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# allow: read, write pr and sec
permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: none

jobs:
  lint-check:
    name: lint-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Lint manifests
        uses: ./.github/actions/lint-check

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.actor, '[bot]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Scan manifests
        uses: ./.github/actions/security-scan

  notify-slack:
    name: notify-slack
    runs-on: ubuntu-latest
    needs: [lint-check, security-scan]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Notify Slack
        uses: ./.github/actions/notify-slack
        with:
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          slack-channel: ${{ vars.SLACK_CHANNEL_CI }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'success' }}
          workflow: ${{ github.workflow }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
