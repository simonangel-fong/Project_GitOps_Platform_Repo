name: security-scan
description: Render Kustomize overlays, then scan rendered output and raw Helm/bootstrap manifests with Checkov. Uploads SARIF to GitHub Security.

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.12"

    - name: Install Checkov
      shell: bash
      env:
        CHECKOV_VERSION: "3.2.334"
      run: pip install --no-cache-dir "checkov==${CHECKOV_VERSION}"

    - name: Render Kustomize overlays
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p .rendered
        for overlay in apps/*/overlays/*/; do
          name="$(echo "${overlay}" | tr '/' '_' | sed 's/_$//')"
          echo "Rendering ${overlay} -> .rendered/${name}.yaml"
          kustomize build "${overlay}" > ".rendered/${name}.yaml"
        done

    - name: Run Checkov (rendered overlays)
      shell: bash
      run: |
        set -euo pipefail
        checkov \
          --directory .rendered \
          --config-file .checkov.yaml \
          --output cli \
          --output sarif \
          --output-file-path console,results_sarif_rendered.sarif

    - name: Run Checkov (non-kustomize paths)
      shell: bash
      run: |
        set -euo pipefail
        checkov \
          --directory . \
          --config-file .checkov.yaml \
          --output cli \
          --output sarif \
          --output-file-path console,results_sarif_raw.sarif

    - name: Upload SARIF (rendered overlays) to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
      with:
        sarif_file: results_sarif_rendered.sarif
        category: checkov-rendered

    - name: Upload SARIF (non-kustomize) to GitHub Security
      if: always()
      uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
      with:
        sarif_file: results_sarif_raw.sarif
        category: checkov-raw
