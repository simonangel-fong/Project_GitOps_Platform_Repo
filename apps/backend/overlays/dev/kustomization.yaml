apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: backend
resources:
  - ../../base
images:
  - name: gitops-backend
    newName: docker.io/simonangelfong/gitops-demo-backend
    newTag: v0.3.1
labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-backend
      env: dev
patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-backend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 4
      - op: replace
        path: /spec/maxReplicas
        value: 6
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 60
  - target:
      kind: Rollout
      name: gitops-backend
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "0.3.1"
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: "green"
      # PGDB_ENABLE
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: "false"
      # PGDB_URL
      - op: replace
        path: /spec/template/spec/containers/0/env/3/value
        value: "jdbc:postgresql://postgres:5432/demo_db"
      ###########################
      # Scenario 3a (OOM escapes dev): OOM_ENABLE=true, OOM_TIME=3.
      # Spring Boot serves traffic normally, then allocates past the 256Mi limit ~3min after start.
      # Dev's 60s pauses complete the rollout in ~3min — OOM lands AFTER promotion. Bug escapes.
      # Recovery: git revert the image-bump commit.
      - op: replace
        path: /spec/template/spec/containers/0/env/4/value
        value: "true"
      - op: replace
        path: /spec/template/spec/containers/0/env/5/value
        value: "3"
