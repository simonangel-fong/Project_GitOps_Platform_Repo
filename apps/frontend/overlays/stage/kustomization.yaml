apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend

resources:
  - ../../base

images:
  # CI writes newTag (and adds digest:) on promotion from dev.
  - name: gitops-demo-frontend
    newName: docker.io/simonangelfong/gitops-demo-frontend
    newTag: stage-PLACEHOLDER

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-demo-frontend-stage
      env: stage

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-demo-frontend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 4
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 70
