apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: frontend

resources:
  - ../../base

images:
  # CI writes newTag and digest: on promotion from stage. Prod must always carry a real digest.
  - name: gitops-demo-frontend
    newName: docker.io/simonangelfong/gitops-demo-frontend
    newTag: prod-PLACEHOLDER

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/instance: gitops-demo-frontend-prod
      env: prod

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: gitops-demo-frontend
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 10
      - op: replace
        path: /spec/metrics/0/resource/target/averageUtilization
        value: 60
