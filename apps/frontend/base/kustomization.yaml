# kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 10_service_account.yaml
  - 20_rollout.yaml
  - 30_service.yaml
  - 40_httproute.yaml
  - 50_hpa.yaml
  - 60_netpol_default_deny.yaml
  - 61_netpol_allow_dns.yaml
  - 62_netpol_allow_ingress_from_traefik.yaml
  - 63_netpol_allow_egress_to_backend.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: gitops-frontend
      app.kubernetes.io/component: frontend
      app.kubernetes.io/part-of: gitops-demo
