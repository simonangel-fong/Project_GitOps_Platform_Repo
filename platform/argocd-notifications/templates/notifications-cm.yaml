apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-notifications-cm
    app.kubernetes.io/part-of: argocd
data:
  service.slack: |
    token: ${{ .Values.slack.secretKey }}

  subscriptions: |
    - recipients:
        - slack:{{ .Values.channels.deployments }}
      triggers:
        - on-sync-succeeded
    - recipients:
        - slack:{{ .Values.channels.alerts }}
      triggers:
        - on-sync-failed
        - on-health-degraded

  template.app-sync-succeeded: |
    message: |
      :white_check_mark: Application *{{ "{{" }}.app.metadata.name{{ "}}" }}* synced successfully.
      Revision: {{ "{{" }}.app.status.sync.revision{{ "}}" }}
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .app.metadata.name {{ "}}" }}",
          "color": "#18be52",
          "fields": [
            { "title": "Sync Status", "value": "{{ "{{" }}.app.status.sync.status{{ "}}" }}", "short": true },
            { "title": "Health",      "value": "{{ "{{" }}.app.status.health.status{{ "}}" }}", "short": true },
            { "title": "Namespace",   "value": "{{ "{{" }}.app.spec.destination.namespace{{ "}}" }}", "short": true },
            { "title": "Revision",    "value": "{{ "{{" }}.app.status.sync.revision{{ "}}" }}", "short": false }
          ]
        }]

  template.app-sync-failed: |
    message: |
      :x: Application *{{ "{{" }}.app.metadata.name{{ "}}" }}* sync failed.
      Phase: {{ "{{" }}.app.status.operationState.phase{{ "}}" }}
      Message: {{ "{{" }}.app.status.operationState.message{{ "}}" }}
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .app.metadata.name {{ "}}" }}",
          "color": "#E96D76",
          "fields": [
            { "title": "Phase",     "value": "{{ "{{" }}.app.status.operationState.phase{{ "}}" }}",   "short": true },
            { "title": "Namespace", "value": "{{ "{{" }}.app.spec.destination.namespace{{ "}}" }}",    "short": true },
            { "title": "Message",   "value": "{{ "{{" }}.app.status.operationState.message{{ "}}" }}", "short": false }
          ]
        }]

  template.app-health-degraded: |
    message: |
      :warning: Application *{{ "{{" }}.app.metadata.name{{ "}}" }}* health degraded.
      Status: {{ "{{" }}.app.status.health.status{{ "}}" }}
    slack:
      attachments: |
        [{
          "title": "{{ "{{" }} .app.metadata.name {{ "}}" }}",
          "color": "#f4c430",
          "fields": [
            { "title": "Health",    "value": "{{ "{{" }}.app.status.health.status{{ "}}" }}",       "short": true },
            { "title": "Namespace", "value": "{{ "{{" }}.app.spec.destination.namespace{{ "}}" }}", "short": true }
          ]
        }]

  trigger.on-sync-succeeded: |
    - description: Application synced successfully
      when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - description: Application sync failed
      when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - description: Application health degraded
      when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
