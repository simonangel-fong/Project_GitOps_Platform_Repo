{{- range $i, $s := .Values.slack }}
{{- if $s.ssmKey }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $s.secretName | quote }}
  namespace: {{ $s.namespace | quote }}
spec:
  refreshPolicy: Periodic
  refreshInterval: {{ $s.refreshInterval | quote }}
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: {{ $s.secretName | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ $s.secretKey | quote }}
      remoteRef:
        key: {{ $s.ssmKey | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
{{- end }}
